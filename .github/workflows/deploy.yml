# ------------------------------------------------------------
# 이름
# ------------------------------------------------------------
name: deploy

# ------------------------------------------------------------
# 트리거: 백엔드 관련 변경만 감지
#  - .env 는 파이프라인에서 생성하므로 감시 대상에서 제외
# ------------------------------------------------------------
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "backend/src/**"
      - "backend/build.gradle.kts"
      - "backend/settings.gradle.kts"
      - "backend/Dockerfile"

# ------------------------------------------------------------
# 권한 최소화(릴리즈/태그, GHCR 푸시만 허용)
# ------------------------------------------------------------
permissions:
  contents: write # 태그/릴리즈
  packages: write # GHCR 로그인/푸시

# ------------------------------------------------------------
# 동시성: 같은 브랜치에서 배포 워크플로우가 겹치면 이전 실행 취소
# ------------------------------------------------------------
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ------------------------------------------------------------
# 기본 셸
# ------------------------------------------------------------
defaults:
  run:
    shell: bash

# ------------------------------------------------------------
# 전역 상수(환경별로 여기만 고치면 됨)
# ------------------------------------------------------------
env:
  IMAGE_NAME: p-14044-1 # 리포지토리 내 서비스(이미지) 이름
  CONTAINER_NAME: p-14044-1_1 # 서버에서 띄울 컨테이너 이름
  EC2_NAME_TAG: terra-ec2-1 # EC2 Name 태그(대상 인스턴스 탐색용)
  DOCKER_NETWORK: common # 서버 측 도커 네트워크 이름

jobs:
  # ----------------------------------------------------------
  # 1) 태그 생성 + 릴리즈 생성
  #    - outputs.tag_name 을 다음 잡에서 사용
  # ----------------------------------------------------------
  tag_release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create_tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      # 버전 태그 자동 생성(커밋 메시지 기반 changelog)
      - name: Create Tag
        id: create_tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # GitHub Release 생성
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create_tag.outputs.new_tag }}
          release_name: Release ${{ steps.create_tag.outputs.new_tag }}
          body: ${{ steps.create_tag.outputs.changelog }}
          draft: false
          prerelease: false

  # ----------------------------------------------------------
  # 2) 도커 이미지 빌드 & GHCR 푸시
  #    - 리포지토리 owner 를 소문자로 변환해 ghcr 경로 생성
  #    - outputs 로 owner_lc, image_repo 노출
  # ----------------------------------------------------------
  build_and_push:
    name: 도커 이미지 빌드와 푸시
    runs-on: ubuntu-latest
    needs: [tag_release]
    env:
      IMAGE_NAME: p-14044-1 # 상단 전역 상수 재사용
    outputs:
      owner_lc: ${{ steps.owner_lc.outputs.value }}
      image_repo: ${{ steps.image_repo.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      # backend/.env 생성(시크릿이 비어있으면 생성하지 않음)
      - name: .env 생성(있을 때만)
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
        run: |
          set -euo pipefail
          if [[ -n "${DOT_ENV:-}" ]]; then
            echo "$DOT_ENV" > backend/.env
          fi

      # Buildx 설치
      - name: Docker Buildx 설치
        uses: docker/setup-buildx-action@v3

      # GHCR 로그인
      - name: 레지스트리 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 리포지토리 owner 소문자화 (GHCR 경로 규칙 대응)
      - name: set lower case owner name
        id: owner_lc
        run: echo "value=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: "${{ github.repository_owner }}"

      # 최종 이미지 리포 경로 산출: ghcr.io/<owner_lc>/<image_name>
      - name: set image repo
        id: image_repo
        run: echo "value=ghcr.io/${{ steps.owner_lc.outputs.value }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      # 빌드 & 푸시 (태그: 릴리즈 태그, latest)
      - name: 빌드 앤 푸시
        uses: docker/build-push-action@v6
        with:
          context: backend # backend 디렉토리 기준
          push: true
          cache-from: type=gha # GHA 캐시 사용(빠른 재빌드)
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.image_repo.outputs.value }}:${{ needs.tag_release.outputs.tag_name }}
            ${{ steps.image_repo.outputs.value }}:latest

  # ----------------------------------------------------------
  # 3) 배포
  #    - EC2(Name 태그로 식별) → SSM 명령으로 컨테이너 교체
  #    - 이미지: ghcr.io/<owner>/<image>:<tag>
  # ----------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [tag_release, build_and_push]
    env:
      OWNER_LC: ${{ needs.build_and_push.outputs.owner_lc }} # ghcr 소유자
      IMAGE_REPO: ${{ needs.build_and_push.outputs.image_repo }} # ghcr.io/<owner>/<image>
      TAG_NAME: ${{ needs.tag_release.outputs.tag_name }} # 배포 태그
      CONTAINER_NAME: p-14044-1_1 # 상단 상수 재사용
      DOCKER_NETWORK: common # 상단 상수 재사용
      EC2_NAME_TAG: terra-ec2-1 # 상단 상수 재사용
    steps:
      # AWS 자격 구성
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 대상 인스턴스 ID 조회(Name 태그로 검색)
      - name: 인스턴스 ID 가져오기
        id: get_instance_id
        run: |
          set -euo pipefail
          IID="$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${EC2_NAME_TAG}" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)"
          if [[ -z "$IID" ]]; then
            echo "No running instance found with Name=${EC2_NAME_TAG}" >&2
            exit 1
          fi
          echo "INSTANCE_ID=$IID" >> "$GITHUB_ENV"
          echo "Found INSTANCE_ID=$IID"

      # SSM 을 통한 원격 배포(기존 컨테이너 교체 후 새 이미지 실행)
      - name: AWS SSM Send-Command
        uses: peterkimzz/aws-ssm-send-command@master
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          instance-ids: ${{ env.INSTANCE_ID }}
          working-directory: /
          comment: Deploy
          command: |
            set -euo pipefail
            IMG="${IMAGE_REPO}:${TAG_NAME}"

            echo "=== 배포 시작 ==="
            echo "이미지: $IMG"
            echo "컨테이너명: ${CONTAINER_NAME}"
            echo "네트워크: ${DOCKER_NETWORK}"

            # GHCR 로그인 (GitHub Token 사용)
            echo "=== GHCR 로그인 시도 ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 기존 컨테이너 정지/삭제(있을 때만)
            echo "=== 기존 컨테이너 정리 ==="
            docker rm -f "${CONTAINER_NAME}" 2>/dev/null || echo "기존 컨테이너가 없습니다"

            # 최신 이미지 풀(태그가 새로 생겼을 수 있으므로 선행)
            echo "=== 이미지 다운로드 ==="
            if docker pull "$IMG"; then
              echo "이미지 다운로드 성공: $IMG"
            else
              echo "이미지 다운로드 실패: $IMG"
              echo "사용 가능한 이미지 목록:"
              docker images | grep "${{ env.IMAGE_NAME }}" || echo "관련 이미지 없음"
              exit 1
            fi

            # 새 컨테이너 실행(필요 옵션은 여기서 일괄 관리)
            echo "=== 새 컨테이너 실행 ==="
            docker run -d \
              --name "${CONTAINER_NAME}" \
              --network "${DOCKER_NETWORK}" \
              -e TZ=Asia/Seoul \
              --restart unless-stopped \
              "$IMG"

            echo "=== 배포 완료 ==="
            echo "실행 중인 컨테이너:"
            docker ps | grep "${CONTAINER_NAME}" || echo "컨테이너 실행 실패"
