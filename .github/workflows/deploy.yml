name: deploy

# 환경변수 설정
env:
  DOCKER_IMAGE_NAME: p-14044-1
  CONTAINER_NAME: p-14044-1_1
  EC2_INSTANCE_TAG_NAME: terra-ec2-1
  DOCKER_NETWORK: common
  BACKEND_DIR: backend

on:
  push:
    paths:
      - ".github/workflows/**"
      - "backend/.env"
      - "backend/src/**"
      - "backend/build.gradle.kts"
      - "backend/settings.gradle.kts"
      - "backend/Dockerfile"
    branches:
      - main

jobs:
  makeTagAndRelease:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create_tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Tag
        id: create_tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create_tag.outputs.new_tag }}
          release_name: Release ${{ steps.create_tag.outputs.new_tag }}
          body: ${{ steps.create_tag.outputs.changelog }}
          draft: false
          prerelease: false

  buildImageAndPush:
    name: 도커 이미지 빌드와 푸시
    needs: makeTagAndRelease
    runs-on: ubuntu-latest
    outputs:
      DOCKER_IMAGE_NAME: ${{ env.DOCKER_IMAGE_NAME }}
      OWNER_LC: ${{ env.OWNER_LC }}
    steps:
      - uses: actions/checkout@v4
      - name: .env 파일 생성
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
        run: echo "$DOT_ENV" > ${{ env.BACKEND_DIR }}/.env
      - name: Docker Buildx 설치
        uses: docker/setup-buildx-action@v3
      - name: 레지스트리 로그인
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"
      - name: 빌드 앤 푸시
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ env.DOCKER_IMAGE_NAME }}:${{ needs.makeTagAndRelease.outputs.tag_name }}
            ghcr.io/${{ env.OWNER_LC }}/${{ env.DOCKER_IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [makeTagAndRelease, buildImageAndPush]
    env:
      DOCKER_IMAGE_NAME: ${{ needs.buildImageAndPush.outputs.DOCKER_IMAGE_NAME }}
      OWNER_LC: ${{ needs.buildImageAndPush.outputs.OWNER_LC }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: 인스턴스 ID 가져오기
        id: get_instance_id
        run: |
          # Name 태그로 실행 중인 인스턴스 조회
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.EC2_INSTANCE_TAG_NAME }}" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "$INSTANCE_ID"

      - name: CloudWatch Log Group 준비(없으면 생성 + 1일 보관)
        env:
          LOG_GROUP_NAME: /aws/ssm/deploy # ← 원하는 이름으로 변경 가능
        run: |
          # 로그그룹 생성(이미 있으면 무시)
          aws logs create-log-group --log-group-name "$LOG_GROUP_NAME" 2>/dev/null || true
          # 보관 주기 1일 → 자동 삭제(무료 유지 목적)
          aws logs put-retention-policy --log-group-name "$LOG_GROUP_NAME" --retention-in-days 1

      - name: SSM Send-Command (CloudWatch Logs로 출력 저장)
        env:
          LOG_GROUP_NAME: /aws/ssm/deploy
          DOCKER_IMAGE_NAME: ${{ env.DOCKER_IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          DOCKER_NETWORK: ${{ env.DOCKER_NETWORK }}
          OWNER_LC: ${{ env.OWNER_LC }}
          TAG_NAME: ${{ needs.makeTagAndRelease.outputs.tag_name }}
        run: |
          # ▼ 실제 배포 스크립트(네가 쓰던 커맨드를 그대로 넣되, 안전하게 stop/rm 실패 무시)
          #   - CloudWatchOutputEnabled=true 로 콘솔의 "출력 보기" 버튼이 항상 활성화됨
          #   - heredoc 을 'EOS' 로 감싸 GitHub 표현식/중괄호 이스케이프 문제 방지
          read -r -d '' CMD <<EOS
          docker pull ghcr.io/${OWNER_LC}/${DOCKER_IMAGE_NAME}:${TAG_NAME}

          # 컨테이너가 없어도 실패하지 않게 처리
          docker stop ${CONTAINER_NAME} 2>/dev/null || true
          docker rm   ${CONTAINER_NAME} 2>/dev/null || true

          docker run -d \
            --name ${CONTAINER_NAME} \
            --network ${DOCKER_NETWORK} \
            ghcr.io/${OWNER_LC}/${DOCKER_IMAGE_NAME}:${TAG_NAME}

          # 사용하지 않는 이미지 정리
          # - --filter=reference 로 해당 리포만 걸러냄
          # - 최신 배포 태그와 'latest' 는 보존
          docker images \
            --format '{{.Repository}}:{{.Tag}}' \
            --filter=reference='ghcr.io/${OWNER_LC}/${DOCKER_IMAGE_NAME}:*' \
          | grep -v '^ghcr.io/${OWNER_LC}/${DOCKER_IMAGE_NAME}:${TAG_NAME}$' \
          | grep -v '^ghcr.io/${OWNER_LC}/${DOCKER_IMAGE_NAME}:latest$' \
          | xargs -r docker rmi -f
          EOS

          # ▼ CloudWatch Logs 연동: SSM Run Command 출력이 로그그룹에 저장됨
          aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy from GitHub Actions" \
            --parameters commands="$CMD",workingDirectory="/" \
            --cloud-watch-output-config "CloudWatchOutputEnabled=true,CloudWatchLogGroupName=${LOG_GROUP_NAME}" \
            --output json
