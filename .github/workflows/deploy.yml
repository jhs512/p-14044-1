name: deploy

# =========================
# 전역 환경변수(필요한 것만 최상단으로)
# =========================
env:
  IMAGE_REPOSITORY: p-14044-1 # GHCR 이미지 리포지토리명(소유자 포함 X)
  CONTAINER_1_NAME: p-14044-1_1 # 슬롯1(고정 이름) - 색상 아님
  CONTAINER_2_NAME: p-14044-1_2 # 슬롯2(고정 이름) - 색상 아님
  CONTAINER_PORT: 8080 # 컨테이너 내부 포트(스프링부트)
  EC2_INSTANCE_TAG_NAME: terra-ec2-1 # 배포 대상 EC2 Name 태그
  DOCKER_NETWORK: common # NPM과 같은 도커 네트워크
  BACKEND_DIR: backend # Dockerfile 위치

on:
  push:
    paths:
      - ".github/workflows/**"
      - "backend/.env"
      - "backend/src/**"
      - "backend/build.gradle.kts"
      - "backend/settings.gradle.kts"
      - "backend/Dockerfile"
    branches:
      - main

# 권한 최소화/명시화
permissions:
  contents: write # 태그/릴리즈
  packages: write # GHCR 푸시

# 기본 셸
defaults:
  run:
    shell: bash

jobs:
  makeTagAndRelease:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create_tag.outputs.new_tag }} # 이후 잡에서 사용할 태그명
    steps:
      - uses: actions/checkout@v4

      # 버전 태그 자동 생성 (vX.Y.Z)
      - name: Create Tag
        id: create_tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 릴리즈 생성
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create_tag.outputs.new_tag }}
          release_name: Release ${{ steps.create_tag.outputs.new_tag }}
          body: ${{ steps.create_tag.outputs.changelog }}
          draft: false
          prerelease: false

  buildImageAndPush:
    name: 도커 이미지 빌드와 푸시
    needs: makeTagAndRelease
    runs-on: ubuntu-latest
    outputs:
      IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }} # 다음 잡으로 이미지명 전달
      OWNER_LC: ${{ env.OWNER_LC }} # 소유자 소문자
    steps:
      - uses: actions/checkout@v4

      # 빌드 컨텍스트에 .env 생성 (비어있어도 실패하지 않게)
      - name: .env 파일 생성
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
        run: |
          mkdir -p "${{ env.BACKEND_DIR }}"
          echo "${DOT_ENV}" > "${{ env.BACKEND_DIR }}/.env"

      - name: Docker Buildx 설치
        uses: docker/setup-buildx-action@v3

      # GHCR 로그인
      - name: 레지스트리 로그인
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 저장소 소유자명을 소문자로 (GHCR 경로 표준화)
      - name: set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> "${GITHUB_ENV}"
        env:
          OWNER: "${{ github.repository_owner }}"

      # 캐시를 최대한 활용하여 빌드 → 버전태그 및 latest 동시 푸시
      - name: 빌드 앤 푸시
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_REPOSITORY }}:${{ needs.makeTagAndRelease.outputs.tag_name }}
            ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_REPOSITORY }}:latest

  deploy:
    name: Blue/Green 무중단 배포
    runs-on: ubuntu-latest
    needs: [makeTagAndRelease, buildImageAndPush]
    env:
      IMAGE_REPOSITORY: ${{ needs.buildImageAndPush.outputs.IMAGE_REPOSITORY }} # 이미지명
      OWNER_LC: ${{ needs.buildImageAndPush.outputs.OWNER_LC }} # 소유자 소문자
    steps:
      # AWS 자격 구성
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Name 태그로 EC2 인스턴스 조회
      - name: 인스턴스 ID 가져오기
        id: get_instance_id
        run: |
          set -Eeuo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.EC2_INSTANCE_TAG_NAME }}" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "❌ No running instance with Name=${{ env.EC2_INSTANCE_TAG_NAME }}"
            exit 1
          fi
          echo "INSTANCE_ID=${INSTANCE_ID}" >> "${GITHUB_ENV}"
          echo "Target: ${INSTANCE_ID}"

      # SSM로 bash 스크립트 실행 + CloudWatch/S3 로그 설정
      - name: SSM send-command (bash 강제 + 로깅)
        id: ssm
        env:
          INSTANCE_ID: ${{ env.INSTANCE_ID }}
          OWNER_LC: ${{ env.OWNER_LC }}
          IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
          IMAGE_TAG: ${{ needs.makeTagAndRelease.outputs.tag_name }}
          CONTAINER_1_NAME: ${{ env.CONTAINER_1_NAME }}
          CONTAINER_2_NAME: ${{ env.CONTAINER_2_NAME }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          DOCKER_NETWORK: ${{ env.DOCKER_NETWORK }}
          # NPM 인증/도메인
          NPM_ID: ${{ secrets.NPM_ID }}
          NPM_PASSWORD: ${{ secrets.NPM_PASSWORD }}
          APP_1_DOMAIN: ${{ secrets.NPM_DOMAIN }}
          # 로그 목적지
          CW_LOG_GROUP: /aws/ssm/deploy
          S3_LOG_BUCKET: ${{ secrets.S3_LOG_BUCKET }} # 예: my-company-logs
          S3_LOG_PREFIX: ssm-deploy-logs
        run: |
          set -Eeuo pipefail

          # -------- 1) 원격에서 실행할 bash 스크립트를 한 줄 문자열로 준비 (여기서 <<'EOF' 로 안전하게 리터럴화) --------
          read -r -d '' REMOTE_SCRIPT <<'BASH_EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          # ===== 공용 로깅 세팅 =====
          TS=$(date +%Y%m%d_%H%M%S)
          LOG="/var/log/deploy_${TS}.log"
          mkdir -p /var/log || true
          # 표준출력/에러를 동시에 파일과 콘솔로 보냄
          exec > >(tee -a "$LOG") 2>&1
          set -x  # 실행 커맨드도 함께 로그

          # ===== 의존성 점검 =====
          need() { command -v "$1" >/dev/null 2>&1 || { echo "❌ '$1' not found"; exit 127; }; }
          need docker
          need jq
          need curl

          # ===== 환경변수 로드 (SSM에서 commands 직전에 export로 넣어줌) =====
          : "${OWNER_LC:?}"; : "${IMAGE_REPOSITORY:?}"; : "${IMAGE_TAG:?}"
          : "${CONTAINER_1_NAME:?}"; : "${CONTAINER_2_NAME:?}"; : "${CONTAINER_PORT:?}"; : "${DOCKER_NETWORK:?}"
          : "${NPM_ID:?}"; : "${NPM_PASSWORD:?}"; : "${APP_1_DOMAIN:?}"

          IMAGE="ghcr.io/${OWNER_LC}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          SLOT1="${CONTAINER_1_NAME}"
          SLOT2="${CONTAINER_2_NAME}"
          PORT_IN="${CONTAINER_PORT}"
          NET="${DOCKER_NETWORK}"

          echo "🔹 Use image: ${IMAGE}"
          docker pull "${IMAGE}"

          # ===== NPM 토큰 발급 =====
          TOKEN="$(
            curl -s -X POST http://127.0.0.1:81/api/tokens \
              -H "Content-Type: application/json" \
              -d "{\"identity\": \"${NPM_ID}\", \"secret\": \"${NPM_PASSWORD}\"}" \
            | jq -r '.token // empty'
          )"
          if [ -z "${TOKEN}" ] || [ "${TOKEN}" = "null" ]; then
            echo "❌ failed to get NPM token"; exit 1
          fi

          # 대상 프록시 호스트 ID 조회(도메인 매칭)
          PROXY_ID="$(
            curl -s -X GET "http://127.0.0.1:81/api/nginx/proxy-hosts" \
              -H "Authorization: Bearer ${TOKEN}" \
            | jq "map(select(.domain_names[]==\"${APP_1_DOMAIN}\")) | .[0].id // empty"
          )"
          if [ -z "${PROXY_ID}" ]; then
            echo "❌ proxy-host not found for domain '${APP_1_DOMAIN}'"; exit 1
          fi

          # 현재 업스트림 컨테이너명
          CURRENT_HOST="$(
            curl -s -X GET "http://127.0.0.1:81/api/nginx/proxy-hosts/${PROXY_ID}" \
              -H "Authorization: Bearer ${TOKEN}" \
            | jq -r '.forward_host // empty'
          )"
          echo "🔎 CURRENT_HOST: ${CURRENT_HOST}"

          # ===== 역할(blue/green) 판정 =====
          if [[ "${CURRENT_HOST}" == "${SLOT1}" ]]; then
            BLUE="${SLOT1}"; GREEN="${SLOT2}"
          elif [[ "${CURRENT_HOST}" == "${SLOT2}" ]]; then
            BLUE="${SLOT2}"; GREEN="${SLOT1}"
          else
            BLUE="none";   GREEN="${SLOT1}"
          fi
          echo "🎨 role -> blue(now): ${BLUE}, green(next): ${GREEN}"

          # ===== green 기동 =====
          docker rm -f "${GREEN}" >/dev/null 2>&1 || true
          echo "🚀 run new container → ${GREEN}"
          docker run -d --name "${GREEN}" \
            --network "${NET}" \
            -e TZ=Asia/Seoul \
            "${IMAGE}"

          # ===== 헬스체크: curl 컨테이너로 체크 =====
          echo "⏱ health-check: ${GREEN}"
          HEALTH_OK=false
          TIMEOUT=120
          INTERVAL=3
          ELAPSED=0
          sleep 8  # 초기 부팅 여유

          while (( ELAPSED < TIMEOUT )); do
            CODE="$(docker run --rm --network "${NET}" curlimages/curl -s -o /dev/null -w "%{http_code}" "http://${GREEN}:${PORT_IN}/actuator/health" || true)"
            [[ "${CODE}" == "200" ]] && { HEALTH_OK=true; break; }
            sleep "${INTERVAL}"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [[ "${HEALTH_OK}" == false ]]; then
            echo "❌ ${GREEN} health failed"
            docker logs --tail=200 "${GREEN}" || true
            docker rm -f "${GREEN}" || true
            exit 1
          fi
          echo "✅ ${GREEN} healthy"

          # ===== 업스트림 전환 =====
          NEW_CFG="$(jq -n --arg host "${GREEN}" --argjson port "${PORT_IN}" '{forward_host:$host, forward_port:$port}')"
          curl -s -X PUT "http://127.0.0.1:81/api/nginx/proxy-hosts/${PROXY_ID}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${NEW_CFG}" >/dev/null
          echo "🔁 switch upstream → ${GREEN}:${PORT_IN}"

          # ===== 이전 blue 정리 =====
          if [[ "${BLUE}" != "none" ]]; then
            docker rm -f "${BLUE}" >/dev/null 2>&1 || true
            echo "🧹 removed old blue: ${BLUE}"
          fi

          # ===== 이미지 정리(현재 태그/ latest 제외) =====
          docker images --format '{{.Repository}}:{{.Tag}}' "ghcr.io/${OWNER_LC}/${IMAGE_REPOSITORY}" \
            | grep -v ":${IMAGE_TAG}$" \
            | grep -v ":latest$" \
            | xargs -r docker rmi || true

          echo "🏁 Blue/Green switch complete. now blue = ${GREEN}"
          BASH_EOF

          # -------- 2) SSM Send-Command 호출 (bash -lc로 강제 실행, 로그 구성) --------
          # commands는 배열이라, 먼저 필요한 env export 후 /tmp/deploy.sh 생성 및 실행
          CMD_ID=$(
            aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --instance-ids "${INSTANCE_ID}" \
              --comment "Blue/Green Deploy" \
              --cloud-watch-output-config "CloudWatchLogGroupName=${CW_LOG_GROUP},CloudWatchOutputEnabled=true" \
              --output-s3-bucket-name "${S3_LOG_BUCKET}" \
              --output-s3-key-prefix "${S3_LOG_PREFIX}" \
              --parameters commands="[
                \"set -Eeuo pipefail\",
                \"export OWNER_LC='${OWNER_LC}' IMAGE_REPOSITORY='${IMAGE_REPOSITORY}' IMAGE_TAG='${IMAGE_TAG}'\",
                \"export CONTAINER_1_NAME='${CONTAINER_1_NAME}' CONTAINER_2_NAME='${CONTAINER_2_NAME}' CONTAINER_PORT='${CONTAINER_PORT}' DOCKER_NETWORK='${DOCKER_NETWORK}'\",
                \"export NPM_ID='${NPM_ID}' NPM_PASSWORD='${NPM_PASSWORD}' APP_1_DOMAIN='${APP_1_DOMAIN}'\",
                \"cat > /tmp/deploy.sh <<'EOF' && chmod +x /tmp/deploy.sh\",
                \"${REMOTE_SCRIPT//$'\n'/'\\n'}\",
                \"EOF\",
                \"bash -lc /tmp/deploy.sh\"
              ]" \
              --query "Command.CommandId" --output text
          )

          echo "CommandId=${CMD_ID}"

          # -------- 3) 대기 및 상태 확인 --------
          # (원하면 타임아웃/상태 폴링 간격 조정)
          for i in $(seq 1 60); do
            STATUS=$(aws ssm list-command-invocations --command-id "$CMD_ID" --details --query "CommandInvocations[0].Status" --output text || true)
            echo "SSM Status: $STATUS"
            case "$STATUS" in
              Pending|InProgress|Delayed) sleep 5 ;;
              Success) break ;;
              Cancelled|TimedOut|Failed|Cancelling) echo "❌ SSM failed: $STATUS"; exit 1 ;;
              *) sleep 5 ;;
            esac
          done

          # 최종 상태 확인
          FINAL=$(aws ssm list-command-invocations --command-id "$CMD_ID" --details --query "CommandInvocations[0].Status" --output text || true)
          echo "Final Status: $FINAL"
          [ "$FINAL" = "Success" ] || { echo "❌ Deploy failed: $FINAL"; exit 1; }
